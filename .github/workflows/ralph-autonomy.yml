name: Autonomous Ralph Loop

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  ralph_loop:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    env:
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      BICONOMY_API_KEY: ${{ secrets.BICONOMY_API_KEY }}
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Dependencies
        run: |
          npm install
          npm install -g @anchor-lang/cli
          npm install -g @solana/cli
      
      - name: Make Ralph Loop Executable
        run: |
          chmod +x scripts/ralph/ralph-loop.sh
      
      - name: Run Ralph Autonomous Loop
        run: |
          ./scripts/ralph/ralph-loop.sh 50
        env:
          NODE_ENV: production
      
      - name: Check for Changes
        id: changes
        run: |
          if git diff-index --quiet HEAD --; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure Git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "ralph-autonomy[bot]"
          git config user.email "ralph-autonomy[bot]@users.noreply.github.com"
      
      - name: Stage & Commit Changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "chore: ralph autonomous loop updates

- Agent iteration completed
- PRD tasks updated
- Code changes tested and committed
- See AGENTS.md for details"
      
      - name: Push Changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin main
      
      - name: Create PR for Changes (Optional)
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: ralph autonomous loop updates'
          title: '[Ralph] Autonomous Loop Updates'
          body: |
            ## Ralph Autonomous Loop Update
            
            This PR contains changes from the Ralph Wiggum autonomous development loop.
            
            - See PRD.md for completed tasks
            - See AGENTS.md for iteration learnings
            - Review diffs for code changes
            
            **Note**: Review and merge if changes are acceptable.
          branch: ralph-autonomy-${{ github.run_number }}
          base: main
          delete-branch: true
      
      - name: Report Status
        if: always()
        run: |
          echo "Ralph Loop Execution Summary"
          echo "=============================="
          echo "Workflow Status: ${{ job.status }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Has Changes: ${{ steps.changes.outputs.has_changes }}"
          
          if [ -f "AGENTS.md" ]; then
            echo ""
            echo "Latest Agent Notes:"
            tail -20 AGENTS.md
          fi
